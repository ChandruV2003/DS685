services:
  zenoh:
    image: eclipse/zenoh:latest
    command: ["--listen", "tcp/0.0.0.0:7447"]
    ports:
      - "7448:7447"

  postgres:
    build: ./db
    environment:
      POSTGRES_USER: ds685
      POSTGRES_PASSWORD: ds685
      POSTGRES_DB: ds685
    ports:
      - "5433:5432"
    volumes:
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ds685 -d ds685"]
      interval: 2s
      timeout: 3s
      retries: 40

  ingest:
    build: ./ingest
    environment:
      DATABASE_URL: postgresql://ds685:ds685@postgres:5432/ds685
      ZENOH_CONNECT: tcp/zenoh:7447
      ZENOH_KEY_EXPR: maze/**/detections/v1/*
      LOG_LEVEL: INFO
    volumes:
      - ./report:/out
    depends_on:
      zenoh:
        condition: service_started
      postgres:
        condition: service_healthy

  pipeline:
    build:
      context: ../assignment-2/turtlebot-maze
      dockerfile: docker/Dockerfile.gpu
      target: a2
      args:
        ROS_DISTRO: jazzy
    environment:
      # Headless software rendering
      LIBGL_ALWAYS_SOFTWARE: "1"
      MESA_GL_VERSION_OVERRIDE: "3.3"
      GALLIUM_DRIVER: llvmpipe

      ZENOH_CONNECT: tcp/zenoh:7447
      ROBOT_ID: tb3_sim
      RUN_ID: ""

      IMAGE_TOPIC: /camera/image_raw
      ODOM_TOPIC: /odom
      BASE_FRAME: base_footprint
      CAMERA_FRAME: camera_link

      YOLO_MODEL: yolov8n.pt
      MAX_FPS: "1.0"

      # A3 additions
      SAVE_IMAGES: "1"
      DATA_DIR: /data

      # Nav2 localization (map frame)
      MAP_YAML: /overlay_ws/install/tb_worlds/share/tb_worlds/maps/sim_house_map.yaml
      NAV2_PARAMS: /overlay_ws/install/tb_worlds/share/tb_worlds/configs/nav2_params.yaml
      X_POSE: "0.08"
      Y_POSE: "3.60"
      YAW: "1.57"

      LOG_LEVEL: INFO
    volumes:
      - ./:/workspace
      - ./data:/data
    depends_on:
      zenoh:
        condition: service_started
      ingest:
        condition: service_started
    command: >
      bash -lc '
        bash /workspace/scripts/run_pipeline.sh
      '

  semantics:
    build: ./semantics
    environment:
      DATABASE_URL: postgresql://ds685:ds685@postgres:5432/ds685
      DATA_DIR: /data
      CLIP_MODEL: ViT-B-32
      CLIP_PRETRAINED: laion2b_s34b_b79k
      CELL_SIZE_M: "1.0"
      AGE_GRAPH: ds685_semantic
      LOG_LEVEL: INFO
    volumes:
      - ./:/workspace
      - ./data:/data
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
